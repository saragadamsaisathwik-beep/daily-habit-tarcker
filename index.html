{% extends "base.html" %}

{% block content %}
<div class="main-content">
    <div class="header">
        <h2>Today's Habits - {{ today }}</h2>
        <p>Track your daily habits and build consistency</p>
    </div>

    <div class="add-habit-section">
        <h3>Add New Habit</h3>
        <form id="habitForm">
            <div class="form-group">
                <input type="text" id="habitName" placeholder="Habit name (e.g., Exercise, Meditate)" required>
            </div>
            <div class="form-group">
                <input type="text" id="habitDescription" placeholder="Description (optional)">
            </div>
            <div class="form-group">
                <input type="color" id="habitColor" value="#3498db">
            </div>
            <button type="submit" class="btn btn-primary">+ Add Habit</button>
        </form>
    </div>

    <div class="habits-section">
        <h3>Your Habits</h3>
        <div id="habitsContainer" class="habits-container">
            <!-- Habits will be loaded here -->
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadHabits();
        
        document.getElementById('habitForm').addEventListener('submit', function(e) {
            e.preventDefault();
            addHabit();
        });
    });

    function loadHabits() {
        fetch('/api/habits')
            .then(response => response.json())
            .then(habits => {
                const container = document.getElementById('habitsContainer');
                container.innerHTML = '';
                
                if (habits.length === 0) {
                    container.innerHTML = '<p class="no-habits">No habits yet. Add one to get started!</p>';
                    return;
                }
                
                habits.forEach(habit => {
                    const today = new Date().toISOString().split('T')[0];
                    const isCompleted = habit.completed_dates.includes(today);
                    const habitEl = createHabitElement(habit, isCompleted);
                    container.appendChild(habitEl);
                });
            });
    }

    function createHabitElement(habit, isCompleted) {
        const div = document.createElement('div');
        div.className = `habit-card ${isCompleted ? 'completed' : ''}`;
        div.style.borderLeftColor = habit.color;
        
        const today = new Date().toISOString().split('T')[0];
        const streak = calculateStreak(habit.completed_dates);
        
        div.innerHTML = `
            <div class="habit-header">
                <div class="habit-info">
                    <h4>${habit.name}</h4>
                    <p>${habit.description || 'No description'}</p>
                </div>
                <div class="habit-meta">
                    <span class="streak-badge">🔥 ${streak} day streak</span>
                    <button class="btn-delete" onclick="deleteHabit(${habit.id})">🗑️</button>
                </div>
            </div>
            <div class="habit-actions">
                <button class="btn-complete ${isCompleted ? 'active' : ''}" 
                        onclick="toggleHabit(${habit.id}, ${!isCompleted})">
                    ${isCompleted ? '✓ Completed Today' : 'Mark Complete'}
                </button>
            </div>
        `;
        
        return div;
    }

    function addHabit() {
        const name = document.getElementById('habitName').value;
        const description = document.getElementById('habitDescription').value;
        const color = document.getElementById('habitColor').value;
        
        fetch('/api/habits', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ name, description, color })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('habitForm').reset();
            loadHabits();
        });
    }

    function toggleHabit(habitId, complete) {
        const endpoint = complete ? '/api/habits/' + habitId + '/complete' : '/api/habits/' + habitId + '/uncomplete';
        
        fetch(endpoint, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                loadHabits();
            });
    }

    function deleteHabit(habitId) {
        if (confirm('Are you sure you want to delete this habit?')) {
            fetch('/api/habits/' + habitId, { method: 'DELETE' })
                .then(response => response.json())
                .then(data => {
                    loadHabits();
                });
        }
    }

    function calculateStreak(completedDates) {
        if (completedDates.length === 0) return 0;
        
        const dates = completedDates.map(d => new Date(d).getTime()).sort((a, b) => b - a);
        const today = new Date().toISOString().split('T')[0];
        
        let streak = 0;
        let currentDate = new Date(today);
        
        for (let date of dates) {
            const checkDate = new Date(date).toISOString().split('T')[0];
            const expectedDate = currentDate.toISOString().split('T')[0];
            
            if (checkDate === expectedDate) {
                streak++;
                currentDate.setDate(currentDate.getDate() - 1);
            } else {
                break;
            }
        }
        
        return streak;
    }
</script>
{% endblock %}
